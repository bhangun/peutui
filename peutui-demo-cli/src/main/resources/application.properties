# Peutui demo CLI - every line below is a strategy selection, not app logic.

# --- Project: single fixed workspace rooted at the current directory ---
peutui.project.mode=single
peutui.project.root-path=.

# --- Session: one active conversation at a time ---
peutui.session.mode=single

# --- Storage: plain local files under .peutui/data, no external services ---
peutui.storage.mode=local-file
peutui.storage.local-file.root-path=.peutui/data

# Settings storage can be configured independently; defaults to the same local-file mode.
peutui.settings-storage.mode=local-file
peutui.settings-storage.local-file.root-path=.peutui/data

# --- Agent: single default agent (the "assistant" CDI bean) ---
peutui.agent.mode=single
peutui.agent.default-agent-id=assistant

# --- Provider: single mock provider registered as a CDI bean ---
peutui.provider.selection=single
peutui.provider.default-provider-id=mock

# Uncomment to try multi-agent capability routing instead (requires 2+ Agent beans):
# peutui.agent.mode=multi

# Uncomment to try round-robin or failover across multiple ModelProvider beans:
# peutui.provider.selection=round-robin
# peutui.provider.selection=failover
# peutui.provider.failover-order=anthropic,local-gollek

quarkus.banner.enabled=false
quarkus.log.console.enable=false
